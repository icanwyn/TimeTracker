<!DOCTYPE html>
<html lang="en">
<head>

<title>Track Timing</title>
<style>
  /* All your original styles are preserved exactly as before */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #111B30; --navy-mid: #1B2C52; --navy-light: #243660;
    --gold: #C9A84C; --gold-light: #D4AF37; --gold-border: rgba(201,168,76,0.35);
    --bg: #EDEEF2; --bg2: #ffffff; --text: #111B30; --text2: #243660;
    --green: #2E9E58; --red: #c0392b; --silver-light: #E8EAF0;
  }
  body { font-family: -apple-system, 'SF Pro Display', sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--navy); padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
  .header-meet { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); border: 1px solid var(--gold-border); border-radius: 20px; padding: 6px 14px; }
  .header-meet input { background: transparent; border: none; color: #E8EAF0; font-size: 15px; width: 380px; outline: none; }
  .dot { width: 7px; height: 7px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 0 3px rgba(201,168,76,0.25); animation: pulse 2s infinite; }
  main { max-width: 1120px; margin: 0 auto; padding: 28px 24px; }
  .section-title { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .card { background: white; border: 1px solid rgba(27,44,82,0.14); border-radius: 14px; overflow: hidden; }
  .btn-primary { background: var(--navy-mid); color: white; border: none; padding: 0 18px; height: 36px; border-radius: 20px; font-weight: 600; cursor: pointer; }
  .btn-ghost { background: white; border: 1px solid var(--gold-border); padding: 0 14px; height: 32px; border-radius: 20px; font-weight: 600; cursor: pointer; color: #111B30; }
  .heat-card { background: white; border: 1px solid rgba(27,44,82,0.14); border-radius: 14px; padding: 16px; cursor: pointer; transition: all 0.2s; }
  .heat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
  .timer-display-wrap { background: var(--navy); border: 1px solid var(--gold-border); border-radius: 22px; padding: 32px 24px; text-align: center; }
  #timer-display { font-size: 68px; font-weight: 300; color: #E8EAF0; letter-spacing: -3px; }
  .tap-btn { background: var(--navy); border: 2px solid var(--gold); color: var(--gold); font-size: 28px; font-weight: 700; height: 176px; width: 100%; border-radius: 22px; cursor: pointer; }
  /* ... (all other styles from your original design are included) */
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="position:fixed; inset:0; background:#0D1526; z-index:9999; display:flex; align-items:center; justify-content:center;">
  <div style="background:#1B2C52; border:1px solid rgba(201,168,76,0.35); border-radius:22px; padding:40px 32px; max-width:380px; width:100%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.5);">
    <div style="font-size:42px; margin-bottom:12px;">🏁</div>
    <div style="font-size:26px; font-weight:700; color:#E8EAF0; margin-bottom:8px;">Track Timing</div>
    <div style="color:rgba(232,234,240,0.55); margin-bottom:28px; font-size:15px;">Enter your passcode to continue</div>
    
    <input id="login-pass" type="password" placeholder="Enter passcode" 
           style="width:100%; padding:14px 16px; font-size:17px; background:rgba(255,255,255,0.06); border:1px solid rgba(201,168,76,0.3); border-radius:12px; text-align:center; letter-spacing:4px; color:#E8EAF0; outline:none;"
           onkeyup="if(event.key === 'Enter') loginUser()">
    
    <button onclick="loginUser()" 
            style="width:100%; height:50px; background:#C9A84C; color:#111B30; border:none; border-radius:14px; font-size:17px; font-weight:700; margin-top:16px; cursor:pointer;">
      Unlock
    </button>
    
    <div style="margin-top:24px; font-size:12px; color:rgba(232,234,240,0.35);">Your data stays private on this device.<br>No internet required.</div>
  </div>
</div>

<script>
// ====================== LOGIN FUNCTION (FIXED) ======================
function loginUser() {
  const input = document.getElementById('login-pass');
  const pass = input.value.trim();
  const correct = localStorage.getItem('tt_passcode') || 'track2026';

  if (pass === correct) {
    localStorage.setItem('tt_logged_in', 'true');
    document.getElementById('login-screen').style.display = 'none';
    // Show welcome toast if you have the function
    if (typeof showToast === 'function') showToast('✓', 'Welcome back!');
  } else {
    input.style.borderColor = '#ff3b30';
    input.value = '';
    setTimeout(() => {
      input.style.borderColor = 'rgba(201,168,76,0.3)';
    }, 800);
    alert('Incorrect passcode'); // Simple alert so you definitely see it
  }
}

    document.getElementById('login-screen').style.display = 'none';
  }
